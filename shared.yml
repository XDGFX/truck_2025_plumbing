diagram:
    rankdir: LR
    bgcolor: "#FFFFFF"
    fontname: "JetBrains Mono"

templates:
    tank:
        shape: box3d
        style: "filled,rounded"
        fillcolor: "#dbeafe"
        color: "#2563eb"

    pump:
        shape: box
        style: "filled,rounded"
        fillcolor: "#fed7aa"
        color: "#c2410c"

    filter:
        shape: box
        style: "filled,rounded"
        fillcolor: "#f5f5f4"
        color: "#57534e"

    valve:
        shape: box
        style: "filled,rounded"
        fillcolor: "#dcfce7"
        color: "#166534"

    heater:
        shape: box
        style: "filled,rounded"
        fillcolor: "#fee2e2"
        color: "#b91c1c"

    fixture:
        shape: box
        style: "filled,rounded"
        fillcolor: "#e0f2fe"
        color: "#0369a1"

    manifold:
        shape: box
        style: "filled,rounded"
        fillcolor: "#fef3c7"
        color: "#a16207"

    trap:
        shape: box
        style: "filled,rounded"
        fillcolor: "#ede9fe"
        color: "#7c3aed"

    offpage:
        shape: oval
        style: "filled"
        fillcolor: "#f8fafc"
        color: "#475569"

    vent:
        shape: oval
        style: "filled"
        fillcolor: "#ecfccb"
        color: "#3f6212"

    fitting:
        shape: box
        style: "filled"
        fillcolor: "#f1f5f9"
        color: "#64748b"

components:
    offpage_in:
        template: offpage
        label: FROM OTHER SYSTEM
        ports: [IN]

    offpage_out:
        template: offpage
        label: TO OTHER SYSTEM
        ports: [OUT]

    # --- Fittings ---

    adapter_dwv_1_5_bsp_to_40mm:
        template: fitting
        label: 'DWV ADAPTER 1-1/2" BSP FEMALE → 40MM BARB'
        simple: true

    adapter_25mm_barb_to_1_5_bsp:
        template: fitting
        label: '25MM BARB → 1-1/2" BSP MALE ADAPTER'
        simple: true

    tee_25mm_barb:
        template: fitting
        label: "25MM BARB TEE"
        description: "Equal tee — three 25mm barbed ports"
        ports:
            - name: A
              connection_size: 25MM BARB
              gender: M
            - name: B
              connection_size: 25MM BARB
              gender: M
            - name: C
              connection_size: 25MM BARB
              gender: M

    adapter_10mm_barb_to_3_4_bsp:
        template: fitting
        label: '10MM BARB → 3/4" BSP MALE ADAPTER'
        simple: true

    tee_10mm_barb:
        template: fitting
        label: "10MM BARB TEE"
        ports:
            - name: A
              connection_size: 10MM BARB
              gender: M
            - name: B
              connection_size: 10MM BARB
              gender: M
            - name: C
              connection_size: 10MM BARB
              gender: M

    bung_3_4_bsp:
        template: fitting
        label: '3/4" BSP MALE BUNG'
        simple: true

    solenoid_valve_3_4:
        template: valve
        label: '3/4" SOLENOID VALVE'
        description: 'Normally-closed 24V DC solenoid valve, 3/4" BSP male threaded ports'
        simple: true

    solenoid_valve_1_2:
        template: valve
        label: '1/2" SOLENOID VALVE (M-M)'
        description: 'Normally-closed solenoid valve, 1/2" BSP male both sides'
        simple: true

    adapter_pex_16mm_to_3_4_bsp:
        template: fitting
        label: '16MM PEX → 3/4" BSP MALE ADAPTER'
        simple: true

    adapter_pex_16mm_to_1_2_bsp:
        template: fitting
        label: '16MM PEX → 1/2" BSP MALE ADAPTER'
        simple: true

    adapter_19mm_barb_to_1_2_bsp:
        template: fitting
        label: '19MM BARB → 1/2" BSP FEMALE ADAPTER'
        simple: true

    tee_pex_16mm:
        template: fitting
        label: "16MM PEX TEE"
        ports:
            - name: A
              connection_size: 16MM PEX
              gender: F
            - name: B
              connection_size: 16MM PEX
              gender: F
            - name: C
              connection_size: 16MM PEX
              gender: F

    # --- Heating / Coolant ---

    tee_19mm_barb:
        template: fitting
        label: "19MM BARB TEE"
        ports:
            - name: A
              connection_size: 19MM BARB
              gender: M
            - name: B
              connection_size: 19MM BARB
              gender: M
            - name: C
              connection_size: 19MM BARB
              gender: M

    coolant_pump_12v:
        template: pump
        label: 12V COOLANT PUMP
        description: '12V DC automotive coolant pump, 19mm (3/4") barbed inlet and outlet'
        ports:
            - name: INLET
              connection_size: 19MM BARB
              gender: M
            - name: OUTLET
              connection_size: 19MM BARB
              gender: M

    adapter_19mm_barb_to_1_2_bsp_m:
        template: fitting
        label: '19MM BARB → 1/2" BSP MALE ADAPTER'
        simple: true

    heat_exchanger:
        template: heater
        label: HOT WATER HEAT EXCHANGER
        description: >
            Plate heat exchanger — all ports 1/2" BSP female.
            Water side: inlet (cold) and outlet (hot).
            Coolant side: inlet and outlet.
        ports:
            - name: WATER_IN
              connection_size: '1/2" BSP'
              gender: F
              service_rating: potable
            - name: WATER_OUT
              connection_size: '1/2" BSP'
              gender: F
              service_rating: hot
            - name: COOLANT_IN
              connection_size: '1/2" BSP'
              gender: F
            - name: COOLANT_OUT
              connection_size: '1/2" BSP'
              gender: F

    check_valve_1_2:
        template: valve
        label: '1/2" CHECK VALVE'
        ports:
            - name: IN
              connection_size: '1/2" BSP'
              gender: F
            - name: OUT
              connection_size: '1/2" BSP'
              gender: F
