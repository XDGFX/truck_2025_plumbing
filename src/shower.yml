components:
    shower_tank_8l:
        template: tank
        label: 8L STAINLESS SHOWER TANK
        description: >
            8L stainless steel shower water storage tank.
            Four 19mm hose barb ports: HIGH (return), HIGH_FILL (solenoid fill),
            LOW_DRAIN (drain), LOW_FEED (pump feed).
        ports:
            - name: HIGH
              connection_size: 19MM BARB
              gender: M
            - name: HIGH_FILL
              connection_size: 19MM BARB
              gender: M
            - name: LOW_DRAIN
              connection_size: 19MM BARB
              gender: M
            - name: LOW_FEED
              connection_size: 19MM BARB
              gender: M

    shower_fill_solenoid:
        template: offpage
        label: TO FILL SOLENOID
        simple: true

    shower_mixer:
        template: fixture
        label: SHOWER MIXER
        manufacturer: Mizu
        model: Soothe MK2
        ports:
            - name: COLD_IN
              connection_size: '1/2" BSP'
              gender: F
            - name: HOT_IN
              connection_size: '1/2" BSP'
              gender: F

    adapter_1_2_bsp_f_to_pex_16mm:
        template: fitting
        label: '1/2" BSP FEMALE → 16MM PEX BARB ADAPTER'
        simple: true

    inline_strainer:
        template: filter
        label: INLINE SEDIMENT STRAINER
        simple: true

    diaphragm_pump_24v:
        template: pump
        label: 24V DIAPHRAGM PUMP
        description: >
            24V DC self-priming diaphragm pump with built-in pressure switch.
            Cuts out automatically when downstream pressure rises (valves closed).
            1/2" BSP female inlet and outlet.
        ports:
            - name: INLET
              connection_size: '1/2" BSP'
              gender: F
            - name: OUTLET
              connection_size: '1/2" BSP'
              gender: F

pipes:
    hose_19mm:
        label: "19MM RADIATOR HOSE"
        material: Rubber
        size: "19mm"

    pex_16mm_shower:
        label: "16MM PEX SHOWER PIPE"
        material: PEX
        size: "16mm"

connections:
    # Fill: solenoid (supply diagram) → adapter → tank high fill barb
    - - shower_fill_solenoid
      - hose_19mm
      - adapter_19mm_barb_to_1_2_bsp.fill
      - shower_tank_8l:HIGH_FILL

    # Drain: tank low drain → solenoid valve
    - - shower_tank_8l:LOW_DRAIN
      - hose_19mm
      - adapter_19mm_barb_to_1_2_bsp.drain
      - solenoid_valve_1_2

    # Recirculation feed: tank low feed → strainer → pump → PEX tee
    - - shower_tank_8l:LOW_FEED
      - hose_19mm
      - adapter_19mm_barb_to_1_2_bsp_m.
      - inline_strainer.
      - diaphragm_pump_24v:INLET

    # Pump outlet → PEX tee
    - - diaphragm_pump_24v:OUTLET
      - adapter_1_2_bsp_f_to_pex_16mm.shower_outlet
      - pex_16mm_shower
      - tee_pex_16mm.shower_s1:A

    # Tee → cold inlet on shower mixer
    - - tee_pex_16mm.shower_s1:B
      - pex_16mm_shower
      - adapter_pex_16mm_to_1_2_bsp.
      - shower_mixer:COLD_IN

    # Tee → heat exchanger water inlet
    - - tee_pex_16mm.shower_s1:C
      - pex_16mm_shower
      - adapter_pex_16mm_to_1_2_bsp.
      - heat_exchanger.shower:WATER_IN

    # Heat exchanger water outlet → hot inlet on shower mixer
    - - heat_exchanger.shower:WATER_OUT
      - adapter_pex_16mm_to_1_2_bsp.
      - pex_16mm_shower
      - adapter_pex_16mm_to_1_2_bsp.
      - shower_mixer:HOT_IN
